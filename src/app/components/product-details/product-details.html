<div class="container mt-5 mb-4">
<div class="d-flex align-items-center justify-content-center gap-3" >
  <div>
  <button class="btn btn-outline-primary rounded-pill px-4 shadow" [disabled]="currentId == idsArr[0]" (click)="prevProduct()"><<</button>
  </div>
        <!-- using custom directive -->
        <!-- <div class="card h-100 shadow" appHighlightCard externalColor="wheat"> -->

          <div class="card shadow text-center" style="width: 28rem;" >
        <img [src]="product?.imageUrl" style="height: 250px; object-fit: contain;" class="card-img-top" alt="product">

        <div class="card-body d-flex flex-column">
          <h6> {{product?.id}}</h6>
          <h5 class="card-title text-primary">{{ product?.name }}</h5>

          <p class="card-text text-muted small">
            {{ product?.description }}
          </p>

          <div class="mt-auto d-flex justify-content-between align-items-center">
            <span class="badge bg-success fs-6">
              <!-- pipe (currency) -->
              {{product?.price|currency:'EUR'  }}
            </span>
           @if(product?.quantity != 1){
            <span *ngIf="product?.quantity !=1;else lastItem " 
            class="text-secondary small">
              Qty: {{ product?.quantity }}
            </span>
          }
          @else{
            <span class="text-secondary small">Last Item</span>
          }
            <ng-template #lastItem><span [ngClass]="(product?.quantity==1)?'text-danger':'text-success'" class="text-secondary small">Qty: Last Item</span></ng-template>
          <!-- <span *[ngSwitch]="i.quantity">
            <span *ngSwitchCase="1">Qty: Last item</span>
            <span *ngSwitchCase="2">Qty: Last two items</span>
            <span *ngSwitchDefault>{{i.quantity}}</span>
          </span> -->
          </div>

        </div>
        <div class="card-footer bg-white border-0 text-center">
          <input type="number" class="form-control mb-2" #count min="1" max="{{ product?.quantity }}" placeholder="Quantity">
          <button class="btn btn-outline-primary w-30" [disabled]="product?.quantity ==0" (click)="addToCart(count.value, product)">
            Add to Cart
          </button>
          <button class="btn btn-outline-secondary w-30" (click)="goBack()">
            Back
          </button>
          <a class="btn btn-secondary active" routerLink="/updateProduct/{{product?.id}}" routerLinkActive="active">Update</a>
        </div>
      </div>
        <div>
        <button class="btn btn-outline-primary px-4 rounded-pill" [disabled]="currentId == idsArr[idsArr.length - 1]" (click)="nextProduct()">>></button>
        </div>
      </div>
</div>
